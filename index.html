<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astro Brand Guidelines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:     #00031A;
      --white:     #FFFFFF;
      --purple-90: #1C105D;
      --purple-60: #6D5BD0;
      --purple-40: #988ADF;
      --blue-60:   #234FD2;
      --teal-50:   #56C3C1;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Geist', sans-serif;
      overflow-x: hidden;
    }

    /* ── Site nav ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 32px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .site-nav.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-logo img {
      height: 26px;
      width: auto;
      display: block;
    }

    .nav-menu-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--white);
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--white);
      border-radius: 1px;
    }

    /* ── Hero scroll container — tall enough for 4 illustrations + title ── */
    .hero-scroll {
      height: 700vh;
    }

    .hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ambient background glow that shifts subtly */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 48%,
          rgba(109, 91, 208, 0.18) 0%,
          rgba(35,  79, 210, 0.08) 50%,
          transparent 75%),
        radial-gradient(ellipse 40% 40% at 15% 20%,
          rgba(86, 195, 193, 0.06) 0%,
          transparent 60%),
        radial-gradient(ellipse 35% 35% at 85% 80%,
          rgba(152, 138, 223, 0.07) 0%,
          transparent 60%);
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    /* ── Illustration slides ── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      will-change: transform, opacity;
    }

    .slide img {
      max-width: 62vw;
      max-height: 62vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 32px 72px rgba(109, 91, 208, 0.35))
              drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
      transform-origin: center center;
    }

    .slide video {
      max-width: 62vw;
      max-height: 62vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      transform-origin: center center;
    }

    /* ── Hero title (final beat) ── */
    .hero-title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 48px;
      opacity: 0;
      will-change: transform, opacity;
      z-index: 10;
    }

    /* ── Title stack ── */
    .title-stack {
      position: relative;
      max-width: 840px;
      text-align: center;
    }

    .title-stack h1 {
      font-size: clamp(36px, 5.5vw, 80px);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.02em;
      text-align: center;
    }

    /* White base — sets the natural height of the stack */
    .title-white {
      color: white;
    }

    /* Gradient layer — one gradient spanning the full sentence,
       words are revealed word-by-word via opacity */
    .title-grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(-24.5459deg, #6D5BD0 5.12%, #A1D1A8 46.8%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      pointer-events: none;
    }

    .title-grad .word {
      display: inline;
      opacity: 0;
    }

    /* ── Progress dots ── */
    .progress-dots {
      position: absolute;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transition: background 0.35s ease, transform 0.35s ease;
    }

    .dot.active {
      background: rgba(255, 255, 255, 0.85);
      transform: scale(1.6);
    }

    /* ── Scroll hint ── */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.38);
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 20;
    }

    .scroll-hint .line {
      width: 1px;
      height: 36px;
      background: rgba(255, 255, 255, 0.28);
      animation: linePulse 1.9s ease-in-out infinite;
    }

    @keyframes linePulse {
      0%, 100% { opacity: 0.25; transform: scaleY(0.5) translateY(-4px); }
      50%       { opacity: 1;    transform: scaleY(1)   translateY(0);    }
    }
  </style>
</head>

  <script>
    const heroScroll  = document.getElementById('heroScroll');
    const heroTitle   = document.getElementById('heroTitle');
    const scrollHint  = document.getElementById('scrollHint');
    const slides      = document.querySelectorAll('.slide');
    const dots        = document.querySelectorAll('.dot');
    const heroBg      = document.querySelector('.hero-bg');
    const logoVideo   = document.querySelector('.slide[data-slide="0"] video');
    const siteNav     = document.getElementById('siteNav');
    let prevInVideoBeat = true; // true on load since we start at progress 0
    const gradSpans   = [...document.querySelectorAll('.title-grad .word')];

    // Word animation constants (fractions of the title beat, 0→1)
    const WORD_FADE_IN  = 0.18;  // container fades in over first 18%
    const WORD_START    = 0.22;  // first word begins turning at 22%
    const WORD_SPACING  = 0.10;  // gap between each word's start
    const WORD_DUR      = 0.09;  // each word's transition window
    const FADE_OUT_START = 0.82; // container fades out from 82%

    const NUM_SLIDES  = slides.length;   // 4
    const TOTAL_BEATS = NUM_SLIDES + 1;  // +1 for the title beat

    // Each slide drifts to a unique off-center position (% of viewport)
    // tx = horizontal drift, ty = vertical drift
    const OFFSETS = [
      { tx:   0, ty:  0  },  // Logo video:    centered
      { tx:  11, ty: -7  },  // Robot:         right & up
      { tx: -10, ty:  8  },  // Dome:          left  & down
      { tx:   9, ty:  9  },  // Control Panel: right & down
      { tx: -11, ty: -6  },  // Tech Scene:    left  & up
    ];

    // Smooth ease-in-out cubic
    function ease(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function clamp(v, lo, hi) {
      return Math.max(lo, Math.min(hi, v));
    }

    function update() {
      const scrollY   = window.scrollY;
      const maxScroll = heroScroll.offsetHeight - window.innerHeight;
      const progress  = clamp(scrollY / maxScroll, 0, 1);

      const beatSize = 1 / TOTAL_BEATS; // fraction of total scroll per beat

      // ── Illustration slides ──
      slides.forEach((slide, i) => {
        const beatStart = i * beatSize;
        const local     = (progress - beatStart) / beatSize; // 0→1 within this beat
        const off       = OFFSETS[i];

        let scale, opacity, tx, ty;

        if (local <= 0) {
          // Before this beat — first slide is pre-shown at small scale, centered
          scale   = (i === 0) ? 0.38 : 0.12;
          opacity = (i === 0) ? 1    : 0;
          tx = 0; ty = 0;
        } else if (local < 0.5) {
          // ── Zoom-in + drift-to-offset phase ──
          const t = ease(local * 2);
          const startScale = (i === 0) ? 0.38 : 0.12;
          scale   = startScale + (1.05 - startScale) * t;
          opacity = (i === 0) ? 1 : clamp(local * 10, 0, 1);
          // Drift from center (0,0) toward the slide's offset target
          tx = off.tx * t;
          ty = off.ty * t;
        } else if (local < 1) {
          // ── Zoom-through & fade-out — continue drifting further ──
          const t = ease((local - 0.5) * 2);
          scale   = 1.05 + 0.65 * t;
          opacity = clamp(1 - t * 1.25, 0, 1);
          // Carry on past the offset target for a sense of momentum
          tx = off.tx * (1 + t * 0.4);
          ty = off.ty * (1 + t * 0.4);
        } else {
          // After this beat — gone
          scale   = 1.7;
          opacity = 0;
          tx = off.tx * 1.4;
          ty = off.ty * 1.4;
        }

        // translate() in the transform stack applies before scale,
        // so the visual shift = scale × (tx% of element width)
        slide.style.transform = `scale(${scale.toFixed(4)}) translate(${tx.toFixed(2)}%, ${ty.toFixed(2)}%)`;
        slide.style.opacity   = opacity.toFixed(4);
      });

      // ── Title beat ──
      const titleBeatStart = NUM_SLIDES * beatSize;
      const titleLocal     = clamp((progress - titleBeatStart) / beatSize, 0, 1);

      // Container opacity: fade in → hold → fade out
      let titleOpacity;
      if (titleLocal < WORD_FADE_IN) {
        titleOpacity = ease(titleLocal / WORD_FADE_IN);
      } else if (titleLocal > FADE_OUT_START) {
        titleOpacity = ease(1 - (titleLocal - FADE_OUT_START) / (1 - FADE_OUT_START));
      } else {
        titleOpacity = 1;
      }
      heroTitle.style.opacity   = titleOpacity.toFixed(4);

      // Rise up only during fade-in
      const rise = titleLocal < WORD_FADE_IN ? (1 - titleLocal / WORD_FADE_IN) * 44 : 0;
      heroTitle.style.transform = `translateY(${rise.toFixed(1)}px)`;

      // Word-by-word gradient reveal
      gradSpans.forEach((g, w) => {
        const wStart = WORD_START + w * WORD_SPACING;
        const wT     = clamp((titleLocal - wStart) / WORD_DUR, 0, 1);
        g.style.opacity = ease(wT).toFixed(4);
      });

      // ── Logo video — play once, restart on scroll-back ──
      const inVideoBeat = progress < beatSize;
      if (inVideoBeat && !prevInVideoBeat) {
        logoVideo.currentTime = 0;
        logoVideo.play();
      } else if (!inVideoBeat) {
        logoVideo.pause();
      }
      prevInVideoBeat = inVideoBeat;
      siteNav.classList.toggle('visible', !inVideoBeat);

      // ── Background glow — hidden during logo video beat, fades in as illustrations begin ──
      const videoBeatLocal = clamp(progress / beatSize, 0, 1);
      heroBg.style.opacity = videoBeatLocal < 0.6
        ? '0'
        : ease((videoBeatLocal - 0.6) / 0.4).toFixed(4);

      // ── Scroll hint — fades out on first scroll ──
      scrollHint.style.opacity = Math.max(0, 1 - progress * 18).toFixed(3);

      // ── Progress dots ──
      const activeBeat = clamp(Math.floor(progress / beatSize), 0, TOTAL_BEATS - 1);
      dots.forEach((dot, i) => dot.classList.toggle('active', i === activeBeat));
    }

    window.addEventListener('scroll', update, { passive: true });
    update(); // run once on load to set initial state
  </script>

</body>
</html>
